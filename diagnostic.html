<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Next Move — PWA Diagnostic</title>
<style>
  body{background:#0A0A0F; color:#F5F5F7; font-family:-apple-system,sans-serif; padding:20px; line-height:1.5;}
  h1{font-size:20px;}
  .row{margin-bottom:16px; padding:14px; border-radius:12px; background:#1A1A24; border:1px solid #2A2A38;}
  .ok{color:#3DDC84; font-weight:700;}
  .bad{color:#FF5C7A; font-weight:700;}
  .label{color:#A1A1AE; font-size:13px; margin-bottom:4px;}
  pre{white-space:pre-wrap; word-break:break-all; font-size:12px; color:#A1A1AE; margin-top:8px;}
  button{background:#7C5CFF; color:#fff; border:none; padding:14px 20px; border-radius:12px; font-size:16px; font-weight:700; width:100%;}
</style>
</head>
<body>
<h1>Next Move — Install Diagnostic</h1>
<div id="results"></div>
<button onclick="runChecks()">Run checks again</button>

<script>
async function runChecks(){
  const results = document.getElementById('results');
  results.innerHTML = '<div class="row">Running checks...</div>';
  const rows = [];

  function row(label, ok, detail){
    rows.push(`<div class="row"><div class="label">${label}</div><span class="${ok?'ok':'bad'}">${ok?'✓ PASS':'✗ FAIL'}</span>${detail? '<pre>'+detail+'</pre>' : ''}</div>`);
  }

  // 1. HTTPS check
  row('Served over HTTPS', location.protocol === 'https:', location.protocol);

  // Fetch the REAL index.html fresh (no cache) and inspect its actual head.
  // Everything below checks this fetched text, not this diagnostic page's own DOM.
  const indexUrl = new URL('./index.html', location.href).href;
  let indexHtml = null;
  let manifestHrefRaw = null;

  try {
    const resp = await fetch(indexUrl, {cache: 'no-store'});
    indexHtml = await resp.text();
    row('index.html fetch status', resp.ok, `HTTP ${resp.status} ${resp.statusText} — URL: ${indexUrl}`);
  } catch(e) {
    row('index.html fetch status', false, 'Fetch threw: ' + e.message);
  }

  if (indexHtml) {
    const manifestMatch = indexHtml.match(/<link[^>]+rel=["']manifest["'][^>]*>/i);
    if (manifestMatch) {
      const hrefMatch = manifestMatch[0].match(/href=["']([^"']+)["']/i);
      manifestHrefRaw = hrefMatch ? hrefMatch[1] : null;
      row('Manifest &lt;link&gt; tag found in index.html', true, manifestMatch[0]);
    } else {
      row('Manifest &lt;link&gt; tag found in index.html', false, 'No <link rel="manifest"> found anywhere in the fetched index.html');
    }
  }

  // Manifest fetchable + valid JSON
  let manifestJson = null;
  if (manifestHrefRaw) {
    const manifestUrl = new URL(manifestHrefRaw, indexUrl).href;
    try {
      const resp = await fetch(manifestUrl, {cache: 'no-store'});
      const text = await resp.text();
      row('Manifest file fetch status', resp.ok, `HTTP ${resp.status} ${resp.statusText} — URL: ${manifestUrl}`);
      if (resp.ok) {
        try {
          manifestJson = JSON.parse(text);
          row('Manifest is valid JSON', true, JSON.stringify(manifestJson, null, 2));
        } catch(e) {
          row('Manifest is valid JSON', false, 'Parse error: ' + e.message + '\n\nRaw content:\n' + text);
        }
      }
    } catch(e) {
      row('Manifest file fetch status', false, 'Fetch threw: ' + e.message);
    }
  }

  // Service worker registration (this part IS legitimately about the current
  // browser session, since SW registration is a browser-level API, not page content)
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        row('Service worker registered', true, 'scope: ' + reg.scope + ' | active state: ' + (reg.active ? reg.active.state : 'none'));
      } else {
        row('Service worker registered', false, 'No registration found for this origin/scope');
      }
    } catch(e) {
      row('Service worker registered', false, 'Error checking registration: ' + e.message);
    }

    try {
      const swUrl = new URL('./service-worker.js', indexUrl).href;
      const resp = await fetch(swUrl, {cache: 'no-store'});
      row('service-worker.js file fetch status', resp.ok, `HTTP ${resp.status} ${resp.statusText} — URL: ${swUrl}`);
    } catch(e) {
      row('service-worker.js file fetch status', false, 'Fetch threw: ' + e.message);
    }
  } else {
    row('Service worker support', false, 'navigator.serviceWorker not available in this browser context');
  }

  // Icons fetchable, per manifest
  if (manifestJson && Array.isArray(manifestJson.icons)) {
    const manifestUrl = new URL(manifestHrefRaw, indexUrl).href;
    for (const icon of manifestJson.icons) {
      const iconUrl = new URL(icon.src, manifestUrl).href;
      try {
        const iresp = await fetch(iconUrl, {cache: 'no-store'});
        row(`Icon fetch: ${icon.src} (${icon.sizes}, ${icon.purpose||'any'})`, iresp.ok, `HTTP ${iresp.status} — ${iconUrl}`);
      } catch(e) {
        row(`Icon fetch: ${icon.src}`, false, 'Fetch threw: ' + e.message);
      }
    }
  }

  // beforeinstallprompt — genuinely page/session-specific, stays as-is
  row('beforeinstallprompt fired this session', window.__bipFired === true, window.__bipFired ? 'Chrome offered to install' : 'Event has not fired yet on this page load (may still fire later, or criteria not yet met)');

  // Raw head dump of the REAL index.html, for full visibility
  if (indexHtml) {
    const headMatch = indexHtml.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
    const headContent = headMatch ? headMatch[1] : 'Could not find <head> in fetched HTML';
    rows.push(`<div class="row"><div class="label">Raw &lt;head&gt; of ${indexUrl} (no-cache fetch, ground truth)</div><pre>${headContent.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div>`);
  }

  results.innerHTML = rows.join('');
}

window.__bipFired = false;
window.addEventListener('beforeinstallprompt', (e) => {
  window.__bipFired = true;
});

runChecks();
</script>
</body>
</html>
