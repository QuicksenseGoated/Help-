<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Next Move</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#0A0A0F" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<style>
  :root{
    --bg:#0A0A0F;
    --bg-elevated:#13131A;
    --card:rgba(26,26,36,0.7);
    --card-solid:#1A1A24;
    --border-subtle:rgba(255,255,255,0.07);
    --text-primary:#F5F5F7;
    --text-secondary:#A1A1AE;
    --text-tertiary:#6E6E7C;
    --accent:#7C5CFF;
    --accent-soft:#9D85FF;
    --accent-dim:#5B3FD9;
    --dead:#FF5C7A;
    --okay:#FFC857;
    --locked:#3DDC84;
    --skill:#5FD9D9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text-primary);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
    height:100%; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 20% 0%, rgba(124,92,255,0.10), transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(61,220,132,0.05), transparent 50%),
      linear-gradient(180deg, #0A0A0F 0%, #0E0E14 50%, #0A0A0F 100%);
    display:flex; flex-direction:column;
    max-width:560px; margin:0 auto;
    overflow:hidden;
  }
  .screen{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:24px 20px 140px;
    display:none;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}
  .screen.active{display:block; animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  h1.title{font-size:30px; font-weight:800; margin:0 0 4px; letter-spacing:-0.5px;}
  .subtitle{color:var(--text-secondary); font-size:16px; margin:0 0 20px; line-height:1.4;}
  .section-label{color:var(--text-secondary); font-size:15px; margin:28px 0 14px; font-weight:500;}
  .section-label:first-of-type{margin-top:0;}

  /* ---------- Card ---------- */
  .card{
    background:var(--card);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border-subtle);
    border-radius:26px;
    padding:18px;
  }
  .card.glow{
    box-shadow:0 8px 32px rgba(124,92,255,0.22);
    border-color:rgba(124,92,255,0.25);
  }

  /* ---------- Buttons ---------- */
  .btn{
    border:none; cursor:pointer; font-family:inherit;
    border-radius:22px; padding:17px 24px;
    font-size:16px; font-weight:700;
    width:100%; transition:transform .15s ease, opacity .2s ease;
    -webkit-user-select:none; user-select:none;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{
    background:linear-gradient(135deg,#9D85FF,#7C5CFF);
    color:#fff;
    box-shadow:0 6px 20px rgba(124,92,255,0.35);
  }
  .btn-primary:disabled{opacity:0.35; box-shadow:none; cursor:default;}
  .btn-primary:disabled:active{transform:none;}
  .btn-ghost{
    background:rgba(26,26,36,0.7);
    color:var(--text-primary);
    border:1px solid var(--border-subtle);
  }

  /* ---------- Energy selector ---------- */
  .energy-row{display:flex; gap:12px;}
  .energy-card{
    flex:1; border-radius:22px; padding:22px 8px; text-align:center;
    border:1px solid var(--border-subtle); background:rgba(26,26,36,0.7);
    cursor:pointer; transition:transform .15s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .energy-card:active{transform:scale(0.97);}
  .energy-card .emoji{font-size:26px;}
  .energy-card .label{font-size:13px; font-weight:600; color:var(--text-secondary);}
  .energy-card.sel-dead{border-color:var(--dead); background:rgba(255,92,122,0.10); box-shadow:0 4px 16px rgba(255,92,122,0.3);}
  .energy-card.sel-dead .label{color:var(--dead); font-weight:700;}
  .energy-card.sel-okay{border-color:var(--okay); background:rgba(255,200,87,0.10); box-shadow:0 4px 16px rgba(255,200,87,0.3);}
  .energy-card.sel-okay .label{color:var(--okay); font-weight:700;}
  .energy-card.sel-locked{border-color:var(--locked); background:rgba(61,220,132,0.10); box-shadow:0 4px 16px rgba(61,220,132,0.3);}
  .energy-card.sel-locked .label{color:var(--locked); font-weight:700;}

  /* ---------- Pills ---------- */
  .pill-row{display:flex; flex-wrap:wrap; gap:10px;}
  .pill{
    border-radius:18px; padding:12px 16px; font-size:14px; font-weight:600;
    border:1px solid var(--border-subtle); background:rgba(26,26,36,0.7);
    color:var(--text-secondary); cursor:pointer;
    display:flex; align-items:center; gap:7px;
    transition:transform .15s ease, border-color .2s, background .2s, color .2s;
  }
  .pill:active{transform:scale(0.95);}
  .pill.selected{
    border-color:var(--accent); border-width:2px;
    background:rgba(124,92,255,0.16); color:#D7CCFF; font-weight:700;
  }

  /* ---------- Streak badge ---------- */
  .streak-badge{
    display:inline-flex; align-items:center; gap:6px;
    border-radius:18px; padding:8px 14px; margin-top:10px;
    background:rgba(255,200,87,0.12); border:1px solid rgba(255,200,87,0.3);
    font-size:13px; font-weight:700; color:var(--okay);
  }
  .streak-badge.empty{
    background:rgba(124,92,255,0.12); border:1px solid rgba(124,92,255,0.25); color:var(--accent-soft);
  }

  /* ---------- Mission card (swipe) ---------- */
  .mission-wrap{position:relative; border-radius:24px; margin-bottom:14px; overflow:hidden;}
  .mission-fill-bg{position:absolute; inset:0; background:rgba(61,220,132,0.16);}
  .mission-fill{height:100%; width:0%; background:rgba(61,220,132,0.35); transition:width .05s linear;}
  .mission-card{
    position:relative; background:rgba(26,26,36,0.82); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border-subtle); border-radius:24px; padding:18px;
    touch-action:pan-y;
    will-change:transform;
  }
  .mission-card.dragging{transition:none;}
  .mission-card.snap-back{transition:transform .3s cubic-bezier(.2,.8,.2,1);}
  .mission-card.completed{background:rgba(61,220,132,0.10); border-color:rgba(61,220,132,0.35);}
  .mission-tier{font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase;}
  .mission-tier.main{color:var(--accent-soft);}
  .mission-tier.skill{color:var(--skill);}
  .mission-tier.bonus{color:var(--okay);}
  .mission-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .mission-title{font-size:17px; font-weight:600; color:var(--text-primary);}
  .mission-title.done{color:rgba(245,245,247,0.5); text-decoration:line-through;}
  .mission-hint{color:var(--text-tertiary); font-size:12px; margin-top:8px; transition:opacity .15s;}
  .mission-reduced-note{color:var(--text-tertiary); font-size:12px; margin-top:6px;}
  .check-circle{
    width:26px; height:26px; border-radius:13px; background:var(--locked);
    display:flex; align-items:center; justify-content:center; color:#0A0A0F; font-weight:900; font-size:14px;
    transform:scale(0); transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .mission-card.completed .check-circle{transform:scale(1);}

  /* ---------- Coach ---------- */
  .coach-line{margin-bottom:18px; max-width:88%;}
  .response-row{display:flex; flex-wrap:wrap; gap:10px; margin:10px 0 22px 4px;}
  .response-pill{
    border-radius:16px; padding:11px 15px; font-size:13px; font-weight:600;
    border:1px solid var(--border-subtle); background:rgba(26,26,36,0.7);
    color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; gap:6px;
    transition:transform .15s, opacity .2s;
  }
  .response-pill:active{transform:scale(0.95);}
  .response-pill.chosen{border-color:rgba(124,92,255,0.5); background:rgba(124,92,255,0.18); color:#D7CCFF;}
  .response-pill.faded{opacity:0.35;}
  .response-pill[disabled]{cursor:default;}

  /* ---------- Brain dump ---------- */
  textarea{
    width:100%; background:transparent; border:none; outline:none; resize:none;
    color:var(--text-primary); font-size:16px; font-family:inherit; min-height:90px;
    line-height:1.4;
  }
  textarea::placeholder{color:var(--text-tertiary);}
  .bd-entry{margin-bottom:12px;}
  .bd-entry .row{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
  .bd-entry .txt{font-size:15px; line-height:1.4; flex:1;}
  .bd-entry .del{color:var(--text-tertiary); font-size:18px; cursor:pointer; line-height:1; padding:2px;}
  .bd-entry .time{color:var(--text-tertiary); font-size:12px; margin-top:8px;}
  .empty-hint{color:var(--text-tertiary); font-size:14px; text-align:center; margin-top:30px;}

  /* ---------- Projects ---------- */
  .proj-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .add-btn{
    width:40px; height:40px; border-radius:20px; background:rgba(124,92,255,0.18);
    display:flex; align-items:center; justify-content:center; color:#D7CCFF;
    font-size:22px; font-weight:600; cursor:pointer; border:none;
  }
  .add-btn:active{transform:scale(0.92);}
  .proj-card{margin-bottom:16px;}
  .proj-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .proj-title{font-size:16px; font-weight:600; flex:1; margin-right:10px;}
  .proj-pct{color:var(--text-tertiary); font-size:12px; margin-top:10px;}

  .slider-track{
    height:10px; border-radius:5px; background:rgba(255,255,255,0.08); position:relative;
    touch-action:none; cursor:pointer;
  }
  .slider-fill{height:100%; border-radius:5px; width:0%; transition:width .05s linear;}
  .slider-thumb{
    position:absolute; top:50%; width:22px; height:22px; border-radius:11px; background:#fff;
    transform:translate(-50%,-50%); box-shadow:0 2px 8px rgba(0,0,0,0.4);
    transition:left .05s linear, transform .15s ease;
  }
  .slider-track.dragging .slider-thumb{transform:translate(-50%,-50%) scale(1.3);}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100;
    display:none; align-items:center; justify-content:center; padding:24px;
  }
  .modal-overlay.active{display:flex; animation:fadeIn .25s ease both;}
  .modal-box{width:100%; max-width:420px;}
  .modal-title{font-size:18px; font-weight:800; margin-bottom:16px;}
  .modal-input{
    width:100%; background:transparent; border:1px solid rgba(255,255,255,0.1); border-radius:16px;
    padding:13px 14px; color:var(--text-primary); font-size:16px; margin-bottom:16px; font-family:inherit;
    outline:none;
  }
  .modal-actions{display:flex; gap:12px;}
  .modal-actions .btn{flex:1;}

  /* ---------- Night check-in screen ---------- */
  #nightCheckin{
    position:fixed; inset:0; z-index:90; background:var(--bg); display:none;
    flex-direction:column; max-width:560px; margin:0 auto;
  }
  #nightCheckin.active{display:flex; animation:slideUp .35s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  .nc-scroll{flex:1; overflow-y:auto; padding:20px 20px 60px; -webkit-overflow-scrolling:touch;}
  .nc-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-top:env(safe-area-inset-top,8px);}
  .nc-close{color:var(--text-tertiary); font-size:22px; cursor:pointer;}
  .nc-q{color:var(--text-secondary); font-size:16px; margin-bottom:12px;}
  .nc-block{margin-bottom:20px;}

  /* ---------- Tab bar ---------- */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto;
    height:88px; padding-bottom:24px; padding-top:8px;
    background:rgba(15,15,20,0.92); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
    border-top:1px solid var(--border-subtle);
    display:flex; z-index:50;
  }
  .tab-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; cursor:pointer; color:var(--text-tertiary); font-family:inherit;
    padding-top:4px;
  }
  .tab-btn .icon{font-size:20px; opacity:0.45; transition:opacity .2s, transform .2s;}
  .tab-btn .lbl{font-size:11px; font-weight:600; color:var(--text-tertiary); transition:color .2s;}
  .tab-btn.active .icon{opacity:1; transform:scale(1.05);}
  .tab-btn.active .lbl{color:#D7CCFF;}

  /* Toast */
  #toast{
    position:fixed; bottom:110px; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(26,26,36,0.95); border:1px solid var(--border-subtle); backdrop-filter:blur(20px);
    color:var(--text-primary); padding:12px 20px; border-radius:18px; font-size:14px; font-weight:600;
    opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; z-index:200; max-width:80%; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="app">

  <!-- ============ HOME ============ -->
  <div class="screen active" id="screen-home">
    <h1 class="title" id="homeGreeting">Good Morning 👋</h1>
    <div id="streakBadgeWrap"></div>

    <div id="setupFlow"></div>
    <div id="missionsFlow" style="display:none;"></div>
  </div>

  <!-- ============ COACH ============ -->
  <div class="screen" id="screen-coach">
    <h1 class="title">Coach</h1>
    <div style="height:8px;"></div>
    <div id="coachLines"></div>
  </div>

  <!-- ============ BRAIN DUMP ============ -->
  <div class="screen" id="screen-braindump" style="padding-bottom:0;">
    <div style="padding:0 0 0;">
      <h1 class="title">Brain Dump</h1>
      <p class="subtitle">Get it out of your head. No folders, no pressure.</p>
      <div class="card">
        <textarea id="bdInput" placeholder="What's on your mind?"></textarea>
      </div>
      <div style="margin:14px 0 4px;">
        <button class="btn btn-primary" id="bdAddBtn" disabled>Quick Add</button>
      </div>
    </div>
    <div id="bdList" style="margin-top:12px; padding-bottom:140px;"></div>
  </div>

  <!-- ============ PROJECTS ============ -->
  <div class="screen" id="screen-projects">
    <div class="proj-header">
      <h1 class="title" style="margin-bottom:0;">Projects</h1>
      <button class="add-btn" id="projAddBtn">+</button>
    </div>
    <p class="subtitle">Your works in progress. Drag to update.</p>
    <div id="projList"></div>
  </div>

</div>

<!-- ============ NIGHT CHECK-IN (modal-style screen) ============ -->
<div id="nightCheckin">
  <div class="nc-scroll">
    <div class="nc-header">
      <h1 class="title" style="margin:0;">Night Check-in 🌙</h1>
      <span class="nc-close" id="ncClose">✕</span>
    </div>

    <div class="nc-block">
      <p class="nc-q">What are you proud of today?</p>
      <div class="card"><textarea id="ncProud" placeholder="Anything counts." style="min-height:60px;"></textarea></div>
    </div>
    <div class="nc-block">
      <p class="nc-q">What stopped you today?</p>
      <div class="card"><textarea id="ncStopped" placeholder="No judgment here." style="min-height:60px;"></textarea></div>
    </div>
    <div class="nc-block" style="margin-bottom:28px;">
      <p class="nc-q">What's tomorrow's next move?</p>
      <div class="card"><textarea id="ncNext" placeholder="Just one thing." style="min-height:60px;"></textarea></div>
    </div>

    <button class="btn btn-primary" id="ncSaveBtn">Save &amp; Close</button>
  </div>
</div>

<!-- ============ NEW PROJECT MODAL ============ -->
<div class="modal-overlay" id="projModal">
  <div class="modal-box">
    <div class="card glow">
      <div class="modal-title">New Project</div>
      <input class="modal-input" id="projTitleInput" placeholder="e.g. Funny Compilation" />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="projCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="projCreateBtn" disabled>Create</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ============ TAB BAR ============ -->
<div class="tabbar">
  <button class="tab-btn active" data-tab="home"><span class="icon">🏠</span><span class="lbl">Home</span></button>
  <button class="tab-btn" data-tab="coach"><span class="icon">💬</span><span class="lbl">Coach</span></button>
  <button class="tab-btn" data-tab="braindump"><span class="icon">🧠</span><span class="lbl">Brain Dump</span></button>
  <button class="tab-btn" data-tab="projects"><span class="icon">🎬</span><span class="lbl">Projects</span></button>
</div>

<script>
(function(){
  "use strict";

  // ============================================================
  // STORAGE LAYER  (localStorage stand-in for AsyncStorage)
  // ============================================================
  const KEYS = {
    DAY_PLAN: 'nm:currentDayPlan',
    BRAIN_DUMP: 'nm:brainDump',
    PROJECTS: 'nm:projects',
    NIGHT_CHECKINS: 'nm:nightCheckins',
    STREAK: 'nm:streak',
    COACH_CHECKINS: 'nm:coachCheckins'
  };

  function getJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function setJSON(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }

  // ============================================================
  // DATE HELPERS
  // ============================================================
  function todayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function daysBetween(a,b){
    const [ay,am,ad] = a.split('-').map(Number);
    const [by,bm,bd] = b.split('-').map(Number);
    const da = new Date(ay,am-1,ad);
    const db = new Date(by,bm-1,bd);
    return Math.round((db-da)/(1000*60*60*24));
  }
  function greetingForNow(){
    const h = new Date().getHours();
    if(h<5) return 'Still up';
    if(h<12) return 'Good Morning';
    if(h<17) return 'Good Afternoon';
    return 'Good Evening';
  }
  function isNightTime(){
    const h = new Date().getHours();
    return h>=20 || h<4;
  }
  function timeAgo(iso){
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff/60000);
    if(mins<1) return 'just now';
    if(mins<60) return `${mins}m ago`;
    const hrs = Math.floor(mins/60);
    if(hrs<24) return `${hrs}h ago`;
    return `${Math.floor(hrs/24)}d ago`;
  }

  // ============================================================
  // STREAK ENGINE  (2-consecutive-day grace period)
  // ============================================================
  function getStreak(){
    return getJSON(KEYS.STREAK, {currentStreak:0, longestStreak:0, lastCompletedDate:null, consecutiveMisses:0});
  }
  function saveStreak(s){ setJSON(KEYS.STREAK, s); }

  function registerCreatorDayCompletion(){
    const streak = getStreak();
    const today = todayKey();
    if(streak.lastCompletedDate === today) return streak;

    if(!streak.lastCompletedDate){
      const updated = {currentStreak:1, longestStreak:Math.max(1,streak.longestStreak), lastCompletedDate:today, consecutiveMisses:0};
      saveStreak(updated);
      return updated;
    }

    const gap = daysBetween(streak.lastCompletedDate, today);
    let next;
    if(gap<=1) next = streak.currentStreak+1;          // consecutive day
    else if(gap===2) next = streak.currentStreak+1;      // 1 day missed, forgiven
    else next = 1;                                        // 2+ days missed, reset

    const updated = {currentStreak:next, longestStreak:Math.max(next,streak.longestStreak), lastCompletedDate:today, consecutiveMisses:0};
    saveStreak(updated);
    return updated;
  }

  function checkStreakDecay(){
    const streak = getStreak();
    if(!streak.lastCompletedDate) return streak;
    const gap = daysBetween(streak.lastCompletedDate, todayKey());
    if(gap>=3 && streak.currentStreak!==0){
      const reset = {currentStreak:0, longestStreak:streak.longestStreak, lastCompletedDate:streak.lastCompletedDate, consecutiveMisses:gap-1};
      saveStreak(reset);
      return reset;
    }
    return streak;
  }

  // ============================================================
  // MISSION ENGINE
  // ============================================================
  let idCounter = 0;
  function nextId(prefix){ idCounter++; return `${prefix}_${Date.now()}_${idCounter}`; }

  const TEMPLATES = {
    shorts: {
      dead:   {main:'Edit one Short', skill:'Watch 15 minutes of editing inspo', bonus:'Reply to a few comments'},
      okay:   {main:'Edit and post one Short', skill:'Study a creator who shorts well', bonus:'Queue up 2 more clip ideas'},
      locked: {main:'Edit and post 3 Shorts', skill:'Batch-cut clips for tomorrow', bonus:"Schedule the week's Shorts"}
    },
    longform: {
      dead:   {main:'Open the long-form project for 10 minutes', skill:'Watch 15 minutes of editing inspo', bonus:'Jot 3 title ideas'},
      okay:   {main:'Work 45 minutes on long-form', skill:'Tighten one section of the edit', bonus:'Design a thumbnail concept'},
      locked: {main:'Finish a full long-form edit pass', skill:'Color grade or sound pass', bonus:'Write the description + tags'}
    },
    streaming: {
      dead:   {main:'Go live for 20 minutes, low pressure', skill:'Watch 15 minutes of a streamer you admire', bonus:'Update your stream title'},
      okay:   {main:'Stream for an hour', skill:'Test one new overlay or alert', bonus:'Clip your best stream moment'},

  function applyTimeAdjustment(title, time){
    if(time==='30min'){
      return title
        .replace('Work 45 minutes','Work 20 minutes')
        .replace('Work 90 minutes','Work 20 minutes')
        .replace('Stream for an hour','Stream for 20 minutes')
        .replace('Stream for 2+ hours','Stream for 20 minutes')
        .replace('Stream today','Go live for 20 minutes')
        .replace('Deep dive: 1 hour','Quick 20-minute dive');
    }
    if(time==='4plus'){
      return title
        .replace('Work 45 minutes','Work 90 minutes')
        .replace('Edit one Short','Edit two Shorts')
        .replace('Stream for an hour','Stream for 2+ hours')
        .replace('Stream today','Stream for 2+ hours today');
    }
    return title;
  }

  function reduceMission(mission){
    if(mission.wasReduced) return mission;
    const base = mission.title;
    let reducedTitle = base;
    for(const [pattern, replacement] of REDUCTIONS){
      if(pattern.test(base)){ reducedTitle = replacement; break; }
    }
    if(reducedTitle === base){
      // Generic fallback — only reachable if a template string above was
      // missed. Strip any existing quotes from base so we never nest them.
      const clean = base.replace(/['"]/g, '');
      reducedTitle = `Just spend 5 minutes on: ${clean}`;
    }
    return Object.assign({}, mission, {
      title: reducedTitle,
      originalTitle: mission.originalTitle || base,
      wasReduced: true,
      status: 'pending'
    });
  }

  function attachSwipe(card, fillEl, onComplete){
    let startX = 0, currentX = 0, dragging = false;
    const threshold = Math.min(window.innerWidth, 560) * 0.32;
    const hint = card.querySelector('.mission-hint');

    function setX(x){
      currentX = x;
      const visual = x > 0 ? x : x * 0.15;
      card.style.transform = `translateX(${visual}px)`;
      const pct = Math.max(0, Math.min(100, (visual/threshold)*100));
      fillEl.style.width = pct + '%';
      if(hint) hint.style.opacity = Math.max(0, 1 - (visual/(threshold*0.6)));
    }

    function onDown(e){
      dragging = true;
      startX = (e.touches ? e.touches[0].clientX : e.clientX);
      card.classList.add('dragging');
      card.classList.remove('snap-back');
    }
    function onMove(e){
      if(!dragging) return;
      const x = (e.touches ? e.touches[0].clientX : e.clientX);
      setX(x - startX);
      if(e.cancelable) e.preventDefault();
    }
    function onUp(){
      if(!dragging) return;
      dragging = false;
      card.classList.remove('dragging');
      card.classList.add('snap-back');
      if(currentX > threshold){
        buzz(20);
        card.style.transform = `translateX(${Math.min(window.innerWidth,560)}px)`;
        fillEl.style.width = '100%';
        setTimeout(()=>{ onComplete(); }, 220);
      } else {
        setX(0);
      }
    }

    card.addEventListener('touchstart', onDown, {passive:true});
    card.addEventListener('touchmove', onMove, {passive:false});
    card.addEventListener('touchend', onUp);
    card.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', (e)=>{ if(dragging) onMove(e); });
    window.addEventListener('mouseup', onUp);
  }

  function attachSlider(trackEl, projId, color){
    let dragging = false;

    function setFromClientX(clientX){
      const rect = trackEl.getBoundingClientRect();
      let pct = ((clientX - rect.left) / rect.width) * 100;
      pct = Math.max(0, Math.min(100, pct));
      trackEl.querySelector('.slider-fill').style.width = pct + '%';
      trackEl.querySelector('.slider-thumb').style.left = pct + '%';
      return pct;
    }

    function commit(pct){
      const projects = getJSON(KEYS.PROJECTS, []);
      const updated = projects.map(p => p.id===projId ? Object.assign({}, p, {progress: Math.round(pct), updatedAt: new Date().toISOString()}) : p);
      setJSON(KEYS.PROJECTS, updated);
      const pctLabel = trackEl.parentElement.querySelector('.proj-pct');
      if(pctLabel) pctLabel.textContent = `${Math.round(pct)}% complete`;
    }

    function onDown(e){
      dragging = true;
      trackEl.classList.add('dragging');
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      setFromClientX(x);
    }
    function onMove(e){
      if(!dragging) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      setFromClientX(x);
      if(e.cancelable) e.preventDefault();
    }
    function onUp(e){
      if(!dragging) return;
      dragging = false;
      trackEl.classList.remove('dragging');
      const x = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
      const pct = setFromClientX(x !== undefined ? x : (trackEl.getBoundingClientRect().left));
      buzz(8);
      commit(pct);
    }

    trackEl.addEventListener('touchstart', onDown, {passive:true});
    trackEl.addEventListener('touchmove', onMove, {passive:false});
    trackEl.addEventListener('touchend', onUp);
    trackEl.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', (e)=>{ if(dragging) onMove(e); });
    window.addEventListener('mouseup', onUp);
  }

  function deleteProject(id){
    buzz(8);
    const projects = getJSON(KEYS.PROJECTS, []).filter(p=>p.id!==id);
    setJSON(KEYS.PROJECTS, projects);
    renderProjects();
  }

  // New project modal
  const projModal = document.getElementById('projModal');
  const projTitleInput = document.getElementById('projTitleInput');
  const projCreateBtn = document.getElementById('projCreateBtn');

  document.getElementById('projAddBtn').addEventListener('click', ()=>{
    projTitleInput.value = '';
    projCreateBtn.disabled = true;
    projModal.classList.add('active');
    setTimeout(()=> projTitleInput.focus(), 50);
  });
  document.getElementById('projCancelBtn').addEventListener('click', ()=>{
    projModal.classList.remove('active');
  });
  projTitleInput.addEventListener('input', ()=>{
    projCreateBtn.disabled = !projTitleInput.value.trim();
  });
  projCreateBtn.addEventListener('click', ()=>{
    const title = projTitleInput.value.trim();
    if(!title) return;
    buzz(10);
    const now = new Date().toISOString();
    const projects = getJSON(KEYS.PROJECTS, []);
    projects.push({id:`proj_${Date.now()}`, title, progress:0, createdAt:now, updatedAt:now});
    setJSON(KEYS.PROJECTS, projects);
    projModal.classList.remove('active');
    renderProjects();
  });

  // ============================================================
  // TAB NAVIGATION
  // ============================================================
  const SCREENS = ['home','coach','braindump','projects'];
  function switchTab(tab){
    SCREENS.forEach(s=>{
      document.getElementById('screen-'+s).classList.toggle('active', s===tab);
    });
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.tab===tab);
    });
    if(tab==='coach') renderCoach();
    if(tab==='braindump') renderBrainDump();
    if(tab==='projects') renderProjects();
    if(tab==='home') renderHome();
  }
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
  });

  // ============================================================
  // INIT
  // ============================================================
  loadDayPlan();
  renderHome();

})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {
        // Offline support just won't be available this session — the app
        // still works fine over the network without it.
      });
    });
  }
</script>
